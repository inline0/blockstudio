name: Distribution

on:
  push:
    branches: [main, '7.*']
  workflow_dispatch:

concurrency:
  group: dist-${{ github.ref }}
  cancel-in-progress: true

env:
  # Version-like branches (7.1.0) become 7.1.0.x-dev, others become dev-{branch}
  BS_VERSION: ${{ contains(github.ref_name, '.') && format('{0}.x-dev', github.ref_name) || format('dev-{0}', github.ref_name) }}

jobs:
  zip-integrity:
    name: Zip integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, json, zip, simplexml, libxml, iconv

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build zip
        run: |
          mkdir -p build/blockstudio
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='/tests' --exclude='/docs' \
            --exclude='/evals' --exclude='/src' --exclude='.github' --exclude='_reference' \
            --exclude='.env*' --exclude='*.config.*' --exclude='tsconfig*' \
            --exclude='package.json' --exclude='package-lock.json' --exclude='.npmrc' \
            --exclude='.gitignore' --exclude='.prettierrc*' --exclude='eslint*' \
            --exclude='phpcs.xml*' --exclude='scoper.inc.php' --exclude='build.sh' \
            --exclude='CLAUDE.md' --exclude='.claude' --exclude='/build' \
            . build/blockstudio/
          cd build && zip -r ../blockstudio.zip blockstudio/

      - name: Verify required files exist
        run: |
          cd build/blockstudio
          for f in blockstudio.php bootstrap.php readme.txt vendor/autoload.php lib/tailwindphp-autoload.php includes/class-plugin.php; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          for d in lib includes/classes includes/admin/assets; do
            if [ ! -d "$d" ]; then
              echo "MISSING DIR: $d"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Verify no dev files leaked
        run: |
          cd build/blockstudio
          for f in node_modules tests docs evals .github _reference CLAUDE.md scoper.inc.php; do
            if [ -e "$f" ]; then
              echo "LEAKED: $f"
              exit 1
            fi
          done
          echo "No dev files leaked"

      - name: Verify PHP syntax
        run: |
          cd build/blockstudio
          find . -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null
          echo "All PHP files parse cleanly"

      - name: Verify autoloader resolves scoped classes
        run: |
          cd build/blockstudio
          php -r "
            require 'vendor/autoload.php';
            require 'lib/tailwindphp-autoload.php';
            \$classes = [
              'YahnisElsts\\\PluginUpdateChecker\\\v5\\\PucFactory',
              'BlockstudioVendor\\\MatthiasMullie\\\Minify\\\CSS',
              'BlockstudioVendor\\\ScssPhp\\\ScssPhp\\\Compiler',
              'BlockstudioVendor\\\League\\\Uri\\\Uri',
            ];
            foreach (\$classes as \$class) {
              if (!class_exists(\$class)) {
                echo \"MISSING CLASS: \$class\n\";
                exit(1);
              }
            }
            echo \"All scoped classes resolve\n\";
          "

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockstudio-zip
          path: blockstudio.zip

  plugin-zip:
    name: Plugin install (zip)
    needs: zip-integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for test theme)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: blockstudio-zip

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, json, zip, simplexml, libxml, iconv, mysqli
          tools: wp-cli

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress;"

      - name: Set up WordPress
        run: |
          mkdir wordpress && cd wordpress
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=root
          wp core install --url=http://localhost --title=Test --admin_user=admin --admin_email=admin@test.com --admin_password=password --skip-email

      - name: Install and activate plugin from zip
        run: |
          cd wordpress
          wp plugin install ../blockstudio.zip --activate

      - name: Install test theme with Timber
        run: |
          cp -r repo/tests/theme wordpress/wp-content/themes/blockstudio-test
          composer install --no-interaction --working-dir=wordpress/wp-content/themes/blockstudio-test
          cd wordpress
          wp theme activate blockstudio-test

      - name: Verify plugin loads, blocks register, and URLs are correct
        run: |
          cd wordpress
          wp eval "
            echo 'BLOCKSTUDIO_VERSION: ' . BLOCKSTUDIO_VERSION . PHP_EOL;
            echo 'BLOCKSTUDIO_URL: ' . BLOCKSTUDIO_URL . PHP_EOL;

            \$url = BLOCKSTUDIO_URL . 'includes/admin/assets/blocks/index.tsx.js';
            if (strpos(\$url, '/wp-content/plugins/blockstudio/') === false) {
              echo \"FAIL: asset URL wrong: \$url\n\"; exit(1);
            }
            echo \"Asset URL OK\n\";

            \$block = WP_Block_Type_Registry::get_instance()->get_registered('blockstudio/type-number');
            if (!\$block) { echo \"FAIL: block not registered\n\"; exit(1); }
            echo 'Block registered: ' . \$block->name . PHP_EOL;
          "

      - name: Verify block renders on frontend
        run: |
          cd wordpress
          wp post create --post_title='Dist Test' --post_status=publish --post_content='[bs_test_render name="blockstudio/type-number" number="42"]' --porcelain
          CONTENT=$(wp eval "
            \$p = get_page_by_title('Dist Test', OBJECT, 'post');
            if (!\$p) { echo 'FAIL: post not found'; exit(1); }
            echo apply_filters('the_content', \$p->post_content);
          ")
          echo "$CONTENT"
          echo "$CONTENT" | grep -q "42" || { echo "FAIL: block output missing"; exit 1; }
          echo "Block renders correctly"

  plugin-composer:
    name: Plugin via Composer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for test theme)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, json, zip, simplexml, libxml, iconv, mysqli
          tools: wp-cli

      - name: Install Blockstudio into plugins via Composer
        run: |
          mkdir -p test-project && cd test-project
          cat > composer.json << COMPOSER
          {
            "repositories": [
              {
                "type": "vcs",
                "url": "https://github.com/${{ github.repository }}"
              }
            ],
            "minimum-stability": "dev",
            "prefer-stable": true,
            "require": {
              "composer/installers": "^2.0",
              "blockstudio/blockstudio": "${{ env.BS_VERSION }}"
            },
            "config": {
              "allow-plugins": {
                "composer/installers": true
              }
            },
            "extra": {
              "installer-paths": {
                "wordpress/wp-content/plugins/{\$name}/": ["type:wordpress-plugin"]
              }
            }
          }
          COMPOSER
          composer install --no-interaction --prefer-dist
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Verify package installed into plugins directory
        run: |
          test -f test-project/wordpress/wp-content/plugins/blockstudio/blockstudio.php
          echo "Plugin installed to wp-content/plugins via Composer"

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress;"

      - name: Set up WordPress and verify
        run: |
          cd test-project/wordpress
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=root
          wp core install --url=http://localhost --title=Test --admin_user=admin --admin_email=admin@test.com --admin_password=password --skip-email

          # Load Composer autoloader via mu-plugin (standard Bedrock pattern)
          mkdir -p wp-content/mu-plugins
          echo "<?php require_once '$GITHUB_WORKSPACE/test-project/vendor/autoload.php';" > wp-content/mu-plugins/autoloader.php

          wp plugin activate blockstudio

          cp -r $GITHUB_WORKSPACE/repo/tests/theme wp-content/themes/blockstudio-test
          composer install --no-interaction --working-dir=wp-content/themes/blockstudio-test
          wp theme activate blockstudio-test

      - name: Verify blocks register and URLs are correct
        run: |
          cd test-project/wordpress
          wp eval "
            echo 'BLOCKSTUDIO_URL: ' . BLOCKSTUDIO_URL . PHP_EOL;
            \$url = BLOCKSTUDIO_URL . 'includes/admin/assets/blocks/index.tsx.js';
            if (strpos(\$url, '/wp-content/plugins/blockstudio/') === false) {
              echo \"FAIL: asset URL wrong: \$url\n\"; exit(1);
            }
            \$block = WP_Block_Type_Registry::get_instance()->get_registered('blockstudio/type-number');
            if (!\$block) { echo \"FAIL: block not registered\n\"; exit(1); }
            echo 'Block: ' . \$block->name . PHP_EOL;
          "

      - name: Verify block renders on frontend
        run: |
          cd test-project/wordpress
          wp post create --post_title='Dist Test' --post_status=publish --post_content='[bs_test_render name="blockstudio/type-number" number="42"]' --porcelain
          CONTENT=$(wp eval "
            \$p = get_page_by_title('Dist Test', OBJECT, 'post');
            if (!\$p) { echo 'FAIL: post not found'; exit(1); }
            echo apply_filters('the_content', \$p->post_content);
          ")
          echo "$CONTENT"
          echo "$CONTENT" | grep -q "42" || { echo "FAIL: block output missing"; exit 1; }
          echo "Block renders correctly"

  theme-bundled:
    name: Theme-bundled via Composer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for test blocks)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, json, zip, simplexml, libxml, iconv, mysqli
          tools: wp-cli

      - name: Create theme with Blockstudio as Composer dependency
        run: |
          mkdir -p test-theme
          cd test-theme
          cat > composer.json << COMPOSER
          {
            "repositories": [
              {
                "type": "vcs",
                "url": "https://github.com/${{ github.repository }}"
              }
            ],
            "minimum-stability": "dev",
            "prefer-stable": true,
            "require": {
              "blockstudio/blockstudio": "${{ env.BS_VERSION }}",
              "timber/timber": "^2.0"
            },
            "config": {
              "allow-plugins": {
                "composer/installers": false
              }
            }
          }
          COMPOSER
          cat > style.css << 'CSS'
          /*
          Theme Name: Composer Theme Test
          */
          CSS
          cat > index.php << 'PHP'
          <?php // Silence is golden.
          PHP
          cat > functions.php << 'PHP'
          <?php
          require_once __DIR__ . '/vendor/autoload.php';
          Timber\Timber::init();
          PHP

      - name: Install Blockstudio via Composer
        run: |
          cd test-theme
          composer install --no-interaction --prefer-dist
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Verify package installed in theme vendor
        run: |
          test -f test-theme/vendor/blockstudio/blockstudio/blockstudio.php
          echo "Blockstudio installed in theme vendor/"

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress;"

      - name: Set up WordPress with theme
        run: |
          mkdir wordpress && cd wordpress
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=root
          wp core install --url=http://localhost --title=Test --admin_user=admin --admin_email=admin@test.com --admin_password=password --skip-email
          cp -r $GITHUB_WORKSPACE/test-theme wp-content/themes/composer-theme-test
          cp -r $GITHUB_WORKSPACE/repo/tests/theme/blockstudio wp-content/themes/composer-theme-test/blockstudio
          cp $GITHUB_WORKSPACE/repo/tests/theme/test-helper.php wp-content/themes/composer-theme-test/test-helper.php
          echo "require_once __DIR__ . '/test-helper.php';" >> wp-content/themes/composer-theme-test/functions.php
          wp theme activate composer-theme-test

      - name: Verify Blockstudio loads, blocks register, and URLs are correct
        run: |
          cd wordpress
          wp eval "
            if (!defined('BLOCKSTUDIO_VERSION')) { echo \"FAIL: not loaded\n\"; exit(1); }
            echo 'BLOCKSTUDIO_VERSION: ' . BLOCKSTUDIO_VERSION . PHP_EOL;
            echo 'BLOCKSTUDIO_URL: ' . BLOCKSTUDIO_URL . PHP_EOL;

            \$url = BLOCKSTUDIO_URL . 'includes/admin/assets/blocks/index.tsx.js';
            if (strpos(\$url, '/wp-content/themes/composer-theme-test/vendor/blockstudio/blockstudio/') === false) {
              echo \"FAIL: URL does not point to theme vendor: \$url\n\"; exit(1);
            }
            echo \"Asset URL OK\n\";

            \$block = WP_Block_Type_Registry::get_instance()->get_registered('blockstudio/type-number');
            if (!\$block) { echo \"FAIL: block not registered\n\"; exit(1); }
            echo 'Block: ' . \$block->name . PHP_EOL;
          "

      - name: Verify block renders on frontend
        run: |
          cd wordpress
          wp post create --post_title='Dist Test' --post_status=publish --post_content='[bs_test_render name="blockstudio/type-number" number="42"]' --porcelain
          CONTENT=$(wp eval "
            \$p = get_page_by_title('Dist Test', OBJECT, 'post');
            if (!\$p) { echo 'FAIL: post not found'; exit(1); }
            echo apply_filters('the_content', \$p->post_content);
          ")
          echo "$CONTENT"
          echo "$CONTENT" | grep -q "42" || { echo "FAIL: block output missing"; exit 1; }
          echo "Block renders correctly"
